<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>你好，Codex</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <div class="tech-grid" aria-hidden="true"></div>
      <section class="title-panel" aria-label="你好，Codex">
        <span class="corner corner-top-left" aria-hidden="true"></span>
        <span class="corner corner-top-right" aria-hidden="true"></span>

        <p class="eyebrow">系统已上线</p>
        <h1>你好，Codex。</h1>
        <p class="intro">构建利落的界面，验证产品想法，把一个小灵感变成可以继续迭代的数字体验。</p>

        <div class="signal-list" aria-label="核心状态">
          <span>智能就绪</span>
          <span>快速预览</span>
          <span>界面清爽</span>
        </div>

        <div class="feature-grid">
          <article>
            <span class="feature-code">01</span>
            <h2>原型构建</h2>
            <p>将想法转化为结构清晰、动效克制的可用界面。</p>
          </article>
          <article>
            <span class="feature-code">02</span>
            <h2>界面设计</h2>
            <p>打造深色未来感视觉系统，同时保持清晰易读与稳定克制。</p>
          </article>
          <article>
            <span class="feature-code">03</span>
            <h2>轻量发布</h2>
            <p>保持页面轻快、响应式友好，并为下一轮迭代留好空间。</p>
          </article>
        </div>

        <div class="status-bar" aria-label="项目状态">
          <div>
            <strong>100%</strong>
            <span>静态页面</span>
          </div>
          <div>
            <strong>0ms</strong>
            <span>零配置</span>
          </div>
          <div>
            <strong>24/7</strong>
            <span>持续在线</span>
          </div>
        </div>

        <span class="corner corner-bottom-left" aria-hidden="true"></span>
        <span class="corner corner-bottom-right" aria-hidden="true"></span>
      </section>
    </main>
  </body>
</html>
